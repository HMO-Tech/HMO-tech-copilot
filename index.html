<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO-Tech | Rhino-Grasshopper AI Co-Pilot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }
        .header { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; 
        }
        /* باکس نگهدارنده بوم سه بعدی */
        #canvas-3d {
            width: 120px; height: 120px; margin-bottom: 5px; cursor: grab;
        }
        #canvas-3d:active { cursor: grabbing; }
        
        .logo { color: #00f2fe; font-size: 32px; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .panel {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 20px; width: 95%; max-width: 850px;
            padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        #chat-box {
            height: 350px; overflow-y: auto; margin-bottom: 20px;
            padding-right: 10px; display: flex; flex-direction: column; gap: 15px;
        }
        .msg { padding: 14px; border-radius: 12px; font-size: 14px; max-width: 90%; line-height: 1.6; }
        .ai { background: #1e293b; border: 1px solid #334155; align-self: flex-start; width: 100%; box-sizing: border-box; }
        .user { background: #00f2fe; color: #020617; font-weight: 600; align-self: flex-end; }
        
        .code-container {
            background: #090d16; border: 1px solid #1e293b; border-radius: 8px;
            margin-top: 10px; padding: 12px; font-family: 'Courier New', Courier, monospace;
            position: relative; overflow-x: auto;
        }
        .code-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1e293b; padding-bottom: 6px; margin-bottom: 8px;
            font-size: 12px; color: #64748b;
        }
        .code-actions button {
            background: #1e293b; color: #00f2fe; border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 3px 8px; font-size: 11px; border-radius: 4px; margin-left: 5px;
        }
        .code-actions button:hover { background: #00f2fe; color: #020617; }
        pre { margin: 0; color: #a7f3d0; font-size: 13px; }

        .input-group { display: flex; gap: 10px; }
        textarea {
            flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 10px;
            color: white; padding: 12px; resize: none; outline: none; transition: border 0.3s; height: 50px;
        }
        textarea:focus { border-color: #00f2fe; }
        .send-btn {
            background: #00f2fe; color: #020617; border: none; padding: 0 25px;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: opacity 0.2s;
        }
        .send-btn:hover { opacity: 0.9; }
        .status { font-size: 11px; color: #10b981; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="header">
        <div id="canvas-3d"></div>
        <div class="logo">HMO-TECH</div>
        <div style="font-size: 12px; color: #64748b; margin-top: 5px; letter-spacing: 2px;">AI RHINO & GRASSHOPPER CO-PILOT</div>
    </div>
    <div class="panel">
        <div id="chat-box">
            <div class="msg ai">
                <b>SYSTEM:</b> HMO-Tech Professional 3D Assistant initialized. Describe the parametric geometry or algorithmic logic you need for Rhinoceros.
            </div>
        </div>
        <div class="input-group">
            <textarea id="input" placeholder="e.g., Create a grid of sine-wave responsive points..."></textarea>
            <button class="send-btn" onclick="send()">SEND</button>
        </div>
        <div class="status">● Co-Pilot Engine: Connected to Vercel Backend</div>
    </div>

    <script>
        // --- کدهای مربوط به رندر ۳ بعدی لوگو (Three.js) ---
        const container = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
        camera.position.z = 3.5;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(120, 120);
        container.appendChild(renderer.domElement);

        // ساخت ساختار هندسی مشبک و تکنولوژی‌محور (Octahedron Grid)
        const geometry = new THREE.OctahedronGeometry(1, 1);
        const material = new THREE.MeshBasicMaterial({
            color: 0x00f2fe,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        const techMesh = new THREE.Mesh(geometry, material);
        scene.add(techMesh);

        // اضافه کردن نقاط اتصال نئونی (Nodes) در تقاطع‌ها
        const pointsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07 });
        const techPoints = new THREE.Points(geometry, pointsMaterial);
        scene.add(techPoints);

        // تعامل با حرکت موس
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.001;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.001;
        });

        function animate() {
            requestAnimationFrame(animate);
            // چرخش خودکار نرم + واکنش به حرکت موس
            techMesh.rotation.x += 0.005 + mouseY * 0.1;
            techMesh.rotation.y += 0.008 + mouseX * 0.1;
            techPoints.rotation.x = techMesh.rotation.x;
            techPoints.rotation.y = techMesh.rotation.y;
            renderer.render(scene, camera);
        }
        animate();

        // --- توابع کمکی پنل چت ---
        function copyCode(btn) {
            const pre = btn.closest('.code-container').querySelector('pre');
            navigator.clipboard.writeText(pre.innerText);
            const origText = btn.innerText;
            btn.innerText = 'COPIED!';
            setTimeout(() => btn.innerText = origText, 1000);
        }

        function downloadCode(btn) {
            const pre = btn.closest('.code-container').querySelector('pre');
            const blob = new Blob([pre.innerText], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'rhino_script.py';
            a.click();
        }

        async function send() {
            const box = document.getElementById('chat-box');
            const input = document.getElementById('input');
            if(!input.value.trim()) return;
            
            const userPrompt = input.value;
            box.innerHTML += `<div class="msg user">${userPrompt}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;
            
            const uniqueId = 'ld_' + Date.now();
            box.innerHTML += `<div class="msg ai" id="${uniqueId}">Analyzing geometry & generating script...</div>`;
            box.scrollTop = box.scrollHeight;
            
            setTimeout(() => {
                const samplePythonCode = `import Rhinoceros as rc\nimport Rhino.Geometry as rg\nimport scriptcontext as sc\n\n# HMO-Tech Generated Parametric Logic\ndef CreateParametricStructure():\n    points = []\n    for i in range(10):\n        for j in range(10):\n            pt = rg.Point3d(i, j, (i*j) * 0.1)\n            points.append(pt)\n            sc.doc.Objects.AddPoint(pt)\n    sc.doc.Views.Redraw()\n\nCreateParametricStructure()`;

                document.getElementById(uniqueId).innerHTML = `
                    <b>HMO-TECH CO-PILOT:</b> Here is your optimized Python script for Rhino. It builds a parametric point network based on your prompt.
                    <div class="code-container">
                        <div class="code-header">
                            <span>rhino_computational_design.py</span>
                            <div class="code-actions">
                                <button onclick="copyCode(this)">Copy</button>
                                <button onclick="downloadCode(this)">Download .py</button>
                            </div>
                        </div>
                        <pre><code>${samplePythonCode}</code></pre>
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            }, 1200);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMO-Tech | Rhino-Grasshopper AI Co-Pilot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }
        .header { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; }
        #canvas-3d { width: 120px; height: 120px; margin-bottom: 5px; cursor: grab; }
        .logo { color: #00f2fe; font-size: 32px; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .panel {
            background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 20px; width: 95%; max-width: 850px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }
        #chat-box { height: 380px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px; border-radius: 12px; font-size: 14px; max-width: 90%; line-height: 1.6; word-wrap: break-word; white-space: pre-line; }
        .ai { background: #1e293b; border: 1px solid #334155; align-self: flex-start; width: 100%; box-sizing: border-box; }
        .user { background: #00f2fe; color: #020617; font-weight: 600; align-self: flex-end; text-align: right; }
        .rtl-layout { direction: rtl; text-align: right; }
        .ltr-layout { direction: ltr; text-align: left; }
        .code-container {
            background: #090d16; border: 1px solid #1e293b; border-radius: 8px;
            margin-top: 10px; padding: 12px; font-family: 'Courier New', Courier, monospace; overflow-x: auto; direction: ltr; text-align: left;
        }
        .code-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 6px; margin-bottom: 8px; font-size: 12px; color: #64748b; }
        .code-actions button { background: #1e293b; color: #00f2fe; border: 1px solid rgba(0, 242, 254, 0.3); padding: 3px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; }
        .code-actions button:hover { background: #00f2fe; color: #020617; }
        pre { margin: 0; color: #a7f3d0; font-size: 13px; }
        .input-group { display: flex; gap: 10px; }
        textarea { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; padding: 12px; resize: none; outline: none; height: 50px; }
        textarea:focus { border-color: #00f2fe; }
        .send-btn { background: #00f2fe; color: #020617; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .status { font-size: 11px; color: #10b981; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div id="canvas-3d"></div>
        <div class="logo">HMO-TECH</div>
        <div style="font-size: 12px; color: #64748b; margin-top: 5px; letter-spacing: 2px;">AI COMPASS & DESIGN CO-PILOT</div>
    </div>
    <div class="panel">
        <div id="chat-box">
            <div class="msg ai"><b>SYSTEM:</b> Live Engine Connected. Enter any engineering query in English or Persian. Press Enter to send.</div>
        </div>
        <div class="input-group">
            <textarea id="input" placeholder="دستور خود را وارد کنید... (ارسال با Enter)"></textarea>
            <button class="send-btn" onclick="send()">SEND</button>
        </div>
        <div class="status">● Co-Pilot Engine: Live API Mode</div>
    </div>

    <script>
        // --- 3D Logo Scene ---
        const container = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000); camera.position.z = 3.5;
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(120, 120); container.appendChild(renderer.domElement);
        const geometry = new THREE.OctahedronGeometry(1, 1);
        const material = new THREE.MeshBasicMaterial({ color: 0x00f2fe, wireframe: true, transparent: true, opacity: 0.8 });
        const techMesh = new THREE.Mesh(geometry, material); scene.add(techMesh);
        function animate() { requestAnimationFrame(animate); techMesh.rotation.x += 0.006; techMesh.rotation.y += 0.009; renderer.render(scene, camera); } animate();

        // --- Core Functions ---
        function copyCode(btn) { const pre = btn.closest('.code-container').querySelector('pre'); navigator.clipboard.writeText(pre.innerText); btn.innerText = 'COPIED!'; setTimeout(() => btn.innerText = 'Copy', 1000); }
        function downloadCode(btn) { const pre = btn.closest('.code-container').querySelector('pre'); const blob = new Blob([pre.innerText], {type: 'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hmo_output.py'; a.click(); }
        function isPersian(text) { return /^[\u0600-\u06FF\s]+/.test(text.trim()); }

        // گوش دادن به کلید Enter در تکست‌اریا
        document.getElementById('input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // جلوگیری از رفتن به خط بعد
                send();
            }
        });

        function formatAIResponse(rawText) {
            const codeBlockRegex = /```python([\s\S]*?)```/g;
            let match, lastIndex = 0, htmlOutput = "";
            const layoutClass = isPersian(rawText) ? "rtl-layout" : "ltr-layout";
            htmlOutput += `<div class="${layoutClass}">`;
            while ((match = codeBlockRegex.exec(rawText)) !== null) {
                htmlOutput += rawText.substring(lastIndex, match.index);
                const codeContent = match[1].trim();
                htmlOutput += `</div><div class="code-container"><div class="code-header"><span>hmo_co_pilot.py</span><div class="code-actions"><button onclick="copyCode(this)">Copy</button><button onclick="downloadCode(this)">Download .py</button></div></div><pre><code>${codeContent}</code></pre></div><div class="${layoutClass}">`;
                lastIndex = codeBlockRegex.lastIndex;
            }
            htmlOutput += rawText.substring(lastIndex) + "</div>";
            return htmlOutput;
        }

        async function send() {
            const box = document.getElementById('chat-box');
            const input = document.getElementById('input');
            const prompt = input.value.trim();
            if(!prompt) return;

            box.innerHTML += `<div class="msg user">${prompt}</div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;

            const uniqueId = 'ld_' + Date.now();
            box.innerHTML += `<div class="msg ai" id="${uniqueId}">Thinking...</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                
                if(response.ok && data.response) {
                    document.getElementById(uniqueId).innerHTML = `<b>HMO-TECH:</b><br>${formatAIResponse(data.response)}`;
                } else {
                    document.getElementById(uniqueId).innerHTML = `<b>SYSTEM ERROR:</b> ${data.error || 'API Connection Failed.'}`;
                }
            } catch (error) {
                document.getElementById(uniqueId).innerHTML = `<b>CONNECTION ERROR:</b> Offline or server unreachable.`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>

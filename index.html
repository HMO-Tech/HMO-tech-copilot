<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&T Ai-TECH | AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --grad-start: #6d28d9; --grad-end: #00e5ff; --bg-main: #f8f9fb; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Space Grotesk', sans-serif; background: #fff; }
        
        /* سایدبار با تم لوگوی تو */
        .sidebar { width: 260px; background: linear-gradient(180deg, var(--grad-start), var(--grad-end)); color: white; padding: 24px; display: flex; flex-direction: column; gap: 40px; }
        .logo-box { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.2rem; }
        .logo-box img { width: 45px; height: 45px; object-fit: contain; }
        
        /* محیط اصلی جمنای استایل */
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); padding: 20px; }
        .studio-card { background: white; border-radius: 24px; flex: 1; border: 1px solid #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* بخش چت و دکمه‌ها */
        .chat-container { width: 100%; max-width: 800px; padding: 20px; }
        .input-area { width: 100%; max-width: 700px; margin: 20px auto; padding: 15px 25px; border-radius: 50px; border: 1px solid #ddd; background: #f0f4f9; display: flex; align-items: center; }
        .sbtn { background: var(--grad-start); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        
        /* دکمه‌های کپی و PDF */
        .b-actions { display: flex; gap: 10px; margin-top: 10px; }
        .b-btn { padding: 5px 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-box">
        <img src="/logo.png" alt="D&T Logo"> 
        <span>D&T Ai-TECH</span>
    </div>
    <div class="nav">
        <div onclick="sw('chat')">Chat</div>
        <div onclick="sw('projects')">Projects</div>
    </div>
</aside>

<main class="main">
    <div class="studio-card">
        <img src="/logo.png" style="width:100px;" alt="Logo">
        <h1>Welcome to your D&T Design Hub</h1>
        
        <div id="chatbox" class="chat-container"></div>
        
        <div class="input-area">
            <textarea id="prompt" style="flex:1; border:none; background:transparent; outline:none;"></textarea>
            <button class="sbtn" onclick="send()">SEND</button>
        </div>
    </div>
</main>

<script>
    // [تمام توابعِ کاملت مثل send, exportPDF, copy, و... را اینجا Paste کن]
    // من اینجا فقط اسکلت را گذاشتم تا مطمئن شوی ظاهر درست شده
</script>
</body>
</html>

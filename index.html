<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&T Ai-TECH | AI Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');

        /* متغیرهای رنگی (تلفیق تم تاریک جمنای و هویت D&T) */
        :root {
            --bg-main: #131314; 
            --bg-sidebar: #1e1f22; 
            --bg-hover: rgba(255, 255, 255, 0.08);
            --brand-cyan: #00ffff;
            --brand-purple: #9068be;
            --text-main: #e3e3e3;
            --text-muted: #c4c7c5;
            
            /* گرادیان متحرک SEND */
            --ai-gradient: linear-gradient(270deg, #1c7bba, #9068be, #e6739f, #00ffff);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            font-family: 'Google Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            direction: ltr; 
        }

        /* --- نوار کناری (Sidebar) --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .sidebar.collapsed {
            width: 68px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            height: 70px;
            box-sizing: border-box;
            white-space: nowrap;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .menu-btn:hover {
            background-color: var(--bg-hover);
            color: white;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 5px;
            transition: opacity 0.2s, transform 0.2s;
        }

        .sidebar.collapsed .brand-container {
            opacity: 0;
            transform: translateX(-10px);
            pointer-events: none;
        }

        .logo-img {
            width: 40px; 
            height: auto;
            filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.3));
        }

        .brand-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* منوی گزینه‌ها */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 16px;
            border-radius: 25px; 
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s, padding 0.3s, border-radius 0.3s;
            white-space: nowrap;
            overflow: hidden;
            box-sizing: border-box;
        }

        .nav-item:hover {
            background-color: var(--bg-hover);
        }

        .nav-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-text {
            transition: opacity 0.2s;
        }

        .sidebar.collapsed .nav-item {
            padding: 12px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            justify-content: center;
            margin: 0 auto;
        }

        .sidebar.collapsed .nav-text {
            display: none;
        }

        /* --- محتوای اصلی --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* گرادیانت پس‌زمینه الهام‌گرفته از رنگ لوگو در بستر تاریک */
            background: radial-gradient(circle at 50% 45%, rgba(144, 104, 190, 0.12) 0%, rgba(0, 255, 255, 0.05) 30%, var(--bg-main) 65%);
            position: relative;
            padding: 20px;
        }

        .greeting-text {
            font-size: 2.5rem;
            font-weight: 400;
            color: transparent;
            background: linear-gradient(90deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            margin-bottom: 45px;
            letter-spacing: -0.5px;
        }

        /* --- باکس ورودی و اتچمنت --- */
        .prompt-container {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* استایل فایل اتچ شده */
        .attachment-badge {
            align-self: flex-start;
            margin-left: 20px;
            background: rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: var(--brand-cyan);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.05);
            direction: rtl; /* برای نمایش صحیح متن فارسی فایل */
        }

        .prompt-box {
            background: rgba(30, 31, 34, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            padding: 10px 15px 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: border-color 0.3s, background 0.3s;
        }

        .prompt-box:focus-within {
            background: rgba(40, 41, 45, 0.9);
            border-color: rgba(144, 104, 190, 0.4);
        }

        .action-icon {
            color: var(--text-muted);
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .chat-input::placeholder {
            color: #888;
        }

        /* --- دکمه متحرک SEND --- */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .send-btn {
            background: var(--ai-gradient);
            background-size: 300% 300%;
            animation: gradientFlow 4s ease infinite;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(144, 104, 190, 0.6);
        }

    </style>
</head>
<body>

    <!-- نوار کناری (Sidebar) کشویی -->
    <aside class="sidebar" id="app-sidebar">
        <div class="sidebar-header">
            <button class="menu-btn" onclick="toggleSidebar()" title="Collapse menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="brand-container">
                <!-- استفاده از فایل بدون بک‌گراند شما -->
                <img src="طراحی بدون عنوان.png" alt="D&T AI Logo" class="logo-img">
                <span class="brand-title">D&T Ai-TECH</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item">
                <div class="nav-icon" style="color: var(--brand-cyan);">
                    <svg viewBox="0 0 24 24"><path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9L12 2Z"></path></svg>
                </div>
                <span class="nav-text">New chat</span>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <span class="nav-text">Search chats</span>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </div>
                <span class="nav-text">Videos</span>
            </a>
            <a href="#" class="nav-item">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                </div>
                <span class="nav-text">Library</span>
            </a>
        </nav>
    </aside>

    <!-- محتوای اصلی با هاله نوری اختصاصی -->
    <main class="main-content">
        <h1 class="greeting-text">Where should we start?</h1>

        <!-- باکس دریافت فرمان به همراه اتچمنت -->
        <div class="prompt-container">
            
            <!-- نمایش فایل پیوست شده (Attachment Badge) -->
            <div class="attachment-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                فایل آپلود شد: design_concept.png
            </div>

            <div class="prompt-box">
                <!-- آیکون آپلود فایل (+) -->
                <div class="action-icon" title="Upload file">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
                
                <input type="text" class="chat-input" placeholder="Ask D&T Ai-TECH or upload a design...">
                
                <!-- آیکون چت صوتی (میکروفن) -->
                <div class="action-icon" title="Voice input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </div>
                
                <button class="send-btn">SEND</button>
            </div>
        </div>
    </main>

    <!-- اسکریپت کنترل جمع شدن سایدبار -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('app-sidebar');
            sidebar.classList.toggle('collapsed');
        }
    </script>

</body>
</html>

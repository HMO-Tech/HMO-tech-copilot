<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>D&T Ai-TECH | Intelligent Core</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 20px; }
        .logo-box { text-align: center; margin-bottom: 20px; }
        .logo-box h1 { color: #00f2fe; margin: 0; font-size: 28px; letter-spacing: 2px; }
        #chat-box { height: 500px; background: #111; border-radius: 15px; padding: 20px; overflow-y: auto; border: 1px solid #222; }
        .input-area { background: #181818; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #333; }
        textarea { flex: 1; background: none; border: none; color: white; outline: none; height: 50px; resize: none; }
        .send-btn { background: #00f2fe; color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .file-btn { color: #888; cursor: pointer; font-size: 20px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .user { background: #222; color: #00f2fe; }
        .ai { background: #000; border-right: 2px solid #00f2fe; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="logo-box"><h1>⬡ D&T Ai-TECH</h1></div>
        <div id="chat-box"></div>
        <div class="input-area">
            <button class="file-btn" onclick="document.getElementById('f').click()">📎</button>
            <input type="file" id="f" style="display:none">
            <textarea id="inp" placeholder="دستور یا تحلیل فایل..."></textarea>
            <button class="send-btn" onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        async function send() {
            const inp = document.getElementById('inp'), f = document.getElementById('f'), box = document.getElementById('chat-box');
            if(!inp.value && f.files.length === 0) return;
            box.innerHTML += `<div class="msg user">کاربر: ${inp.value}</div>`;
            
            let fileParts = [];
            for (let file of f.files) {
                const base64 = await new Promise(r => { let rd = new FileReader(); rd.onload = () => r(rd.result.split(',')[1]); rd.readAsDataURL(file); });
                fileParts.push({ inlineData: { data: base64, mimeType: file.type } });
            }

            try {
                const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ prompt: inp.value, fileParts }) });
                const data = await res.json();
                box.innerHTML += `<div class="msg ai"><b>AI:</b> ${data.response || 'خطا در دریافت پاسخ'}</div>`;
            } catch(e) { box.innerHTML += `<div class="msg ai">خطای اتصال به سرور</div>`; }
            inp.value = ''; f.value = ''; box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>

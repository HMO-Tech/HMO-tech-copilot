<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&T Ai-TECH | دشبورد هوشمند</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --bg-chat-box: #1e1f20;
            --accent: #00f0ff;
            --accent-gradient: linear-gradient(45deg, #00f0ff, #00ffaa);
            --text-main: #e3e3e3;
            --text-sub: #9e9e9e;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- اسکرول بار مخفی و زیبا شبیه جمنای --- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* --- منوی سمت چپ (Sidebar) --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .brand {
            font-size: 20px;
            font-weight: bold;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-project-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .new-project-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        /* سرچ بار چت‌ها */
        .search-container {
            padding: 0 20px 10px 20px;
        }

        .search-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 13px;
            outline: none;
        }

        .search-box:focus {
            border-color: rgba(0, 240, 255, 0.5);
        }

        /* منوهای ناوبری */
        .nav-section {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .section-title {
            font-size: 12px;
            color: var(--text-sub);
            padding: 10px 15px 5px 15px;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 14px;
            gap: 12px;
            transition: background 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(255, 255, 255, 0.06);
        }

        .nav-item span.icon {
            font-size: 16px;
        }

        /* --- بخش اصلی چت و محتوا --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            position: relative;
        }

        .top-bar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .menu-toggle {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            cursor: pointer;
            display: none;
        }

        .current-project-title {
            font-weight: 500;
            color: var(--text-main);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 840px;
            width: 100%;
            margin: 0 auto;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            gap: 20px;
        }

        .welcome-screen h2 {
            font-size: 32px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* باکس ورودی چت شبیه جمنای */
        .input-container {
            padding: 20px;
            max-width: 840px;
            width: 100%;
            margin: 0 auto;
            position: relative;
        }

        .input-wrapper {
            background-color: var(--bg-chat-box);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.05);
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 16px;
            resize: none;
            height: 24px;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 8px;
        }

        /* --- استایل‌های اختصاصی موبایل (ریسپانسیو بی‌نقص بدون حالت ویندوزی) --- */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block; /* نمایش دکمه همبرگری روی موبایل */
            }

            .sidebar {
                position: absolute;
                right: -280px; /* مخفی شدن منو در لبه راست */
                top: 0;
                bottom: 0;
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            }

            .sidebar.active {
                right: 0; /* باز شدن منو به صورت کشویی روی موبایل */
            }

            .welcome-screen h2 {
                font-size: 24px;
            }

            .chat-container {
                padding: 20px 15px;
            }

            .input-container {
                padding: 10px;
            }

            .input-wrapper {
                padding: 10px 16px;
                border-radius: 24px;
            }

            .chat-input {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- منوی سمت چپ (Sidebar) کاملاً منطبق بر ساختار چت جمنای -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">D&T Ai-TECH</div>
            <button class="new-project-btn" id="new-project">
                <span>+</span> پروژه جدید
            </button>
        </div>

        <!-- سرچ بار هوشمند چت‌ها و پروژه‌ها -->
        <div class="search-container">
            <input type="text" class="search-box" id="search-chat" placeholder="جستجو در چت‌ها...">
        </div>

        <div class="nav-section">
            <!-- بخش پروژه‌های فعال کابر -->
            <div class="section-title">پروژه‌ها</div>
            <div id="projects-list">
                <div class="nav-item active" data-proj="default">
                    <span class="icon">📁</span>
                    <span class="proj-name">پروژه پیش‌فرض</span>
                </div>
            </div>

            <!-- بخش لایبرری جامع (مختص کد، پرامپت‌ها و چت‌های پین شده) -->
            <div class="section-title">لایبرری پلتفرم</div>
            <div class="nav-item">
                <span class="icon">📜</span>
                <span>کامپوننت‌ها و کدها</span>
            </div>
            <div class="nav-item">
                <span class="icon">📌</span>
                <span>پرامپت‌های ذخیره شده</span>
            </div>
            <div class="nav-item">
                <span class="icon">💾</span>
                <span>خروجی‌های آرشیو</span>
            </div>
        </div>
    </aside>

    <!-- بخش اصلی نمایش و چت -->
    <main class="main-content">
        <div class="top-bar">
            <button class="menu-toggle" id="menu-toggle">☰</button>
            <div class="current-project-title" id="current-project-title">پروژه پیش‌فرض</div>
            <div style="width: 24px;"></div> <!-- تعادل هدر -->
        </div>

        <div class="chat-container" id="chat-container">
            <div class="welcome-screen" id="welcome-screen">
                <h2>چطور می‌توانم در توسعه پروژه کمکتان کنم؟</h2>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea class="chat-input" id="chat-input" placeholder="پیام خود را اینجا بنویسید..."></textarea>
                <button class="send-btn" id="send-btn">◀</button>
            </div>
            <div class="footer-note">D&T Ai-TECH ممکن است اطلاعات اشتباه نمایش دهد. بررسی صحت اطلاعات توصیه می‌شود.</div>
        </div>
    </main>

    <script>
        // مدیریت منوی کشویی در موبایل
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menu-toggle');
        
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && e.target !== menuToggle) {
                sidebar.classList.remove('active');
            }
        });

        // سیستم مدیریت پروژه فعال و داینامیک
        const newProjectBtn = document.getElementById('new-project');
        const projectsList = document.getElementById('projects-list');
        const currentProjectTitle = document.getElementById('current-project-title');
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');

        newProjectBtn.addEventListener('click', () => {
            const projName = prompt('نام پروژه جدید را وارد کنید:');
            if (projName && projName.trim() !== "") {
                // غیرفعال کردن اکتیو قبلی‌ها
                document.querySelectorAll('#projects-list .nav-item').forEach(item => {
                    item.classList.remove('active');
                });

                // ساخت دکمه پروژه جدید
                const newProjItem = document.createElement('div');
                newProjItem.className = 'nav-item active';
                newProjItem.innerHTML = `<span class="icon">📁</span><span class="proj-name">${projName}</span>`;
                
                // کلیک روی پروژه جدید
                newProjItem.addEventListener('click', () => {
                    document.querySelectorAll('#projects-list .nav-item').forEach(i => i.classList.remove('active'));
                    newProjItem.classList.add('active');
                    currentProjectTitle.innerText = projName;
                    chatContainer.innerHTML = `<div class="welcome-screen"><h2>کار روی پروژه "${projName}" را ادامه دهید</h2></div>`;
                });

                projectsList.appendChild(newProjItem);
                currentProjectTitle.innerText = projName;
                chatContainer.innerHTML = `<div class="welcome-screen"><h2>کار روی پروژه "${projName}" را ادامه دهید</h2></div>`;
                sidebar.classList.remove('active');
            }
        });

        // سیستم سرچ چت و پروژه ساده
        const searchBox = document.getElementById('search-chat');
        searchBox.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('#projects-list .nav-item').forEach(item => {
                const text = item.querySelector('.proj-name').innerText.toLowerCase();
                if(text.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>D&T Ai-TECH | MultiModal</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 800px; }
        #chat-box { height: 400px; background: #0f172a; border-radius: 10px; margin-bottom: 20px; overflow-y: auto; padding: 15px; }
        .input-area { display: flex; gap: 10px; background: #1e293b; padding: 10px; border-radius: 10px; align-items: center; }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; height: 40px; resize: none; }
        .btn-action { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .send-btn { background: #00f2fe; color: black; }
        .file-btn { background: #334155; color: white; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div id="chat-box"></div>
        <div class="input-area">
            <button class="btn-action file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="file" id="fileInput" style="display:none" onchange="document.getElementById('status').innerText='فایل انتخاب شد'">
            <textarea id="input" placeholder="سوال یا دستور خود را بنویسید..."></textarea>
            <button class="btn-action send-btn" onclick="send()">SEND</button>
        </div>
        <div id="status" style="font-size: 12px; color: #00f2fe; margin-top: 5px;"></div>
    </div>

    <script>
        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });

        async function send() {
            const input = document.getElementById('input');
            const fileInput = document.getElementById('fileInput');
            const box = document.getElementById('chat-box');
            
            if(!input.value && fileInput.files.length === 0) return;

            box.innerHTML += `<div style="margin:10px; color:cyan;">کاربر: ${input.value}</div>`;
            
            let fileParts = [];
            for (let file of fileInput.files) {
                const base64 = await new Promise(r => {
                    let reader = new FileReader();
                    reader.onload = () => r(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
                fileParts.push({ inlineData: { data: base64, mimeType: file.type } });
            }

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: input.value, fileParts })
            });

            const data = await res.json();
            box.innerHTML += `<div style="margin:10px; border-bottom:1px solid #333;"><b>AI:</b> ${data.response}</div>`;
            input.value = ''; fileInput.value = ''; document.getElementById('status').innerText = '';
        }
    </script>
</body>
</html>

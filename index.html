<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&T Ai-TECH | AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #F8F9FB; }
        .sidebar-grad { background: linear-gradient(180deg, #2B0066 0%, #8A2BE2 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar-grad w-64 p-6 text-white flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-12">
            <img src="/logo.png" class="w-10 h-10 object-contain" alt="D&T Logo">
            <h1 class="text-xl font-bold tracking-tight">D&T Ai-TECH</h1>
        </div>
        <nav class="flex flex-col gap-6">
            <div class="hover:bg-white/10 p-3 rounded-xl cursor-pointer transition">💬 Chat</div>
            <div class="hover:bg-white/10 p-3 rounded-xl cursor-pointer transition">📁 Projects</div>
            <div class="bg-white/20 p-3 rounded-xl cursor-pointer font-semibold border-l-4 border-cyan-400">🛠 Design Workspace</div>
            <div class="hover:bg-white/10 p-3 rounded-xl cursor-pointer transition">📊 Analysis</div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col p-6">
        <div class="glass-panel flex-1 rounded-3xl shadow-sm flex flex-col items-center justify-center p-8 relative">
            <div class="text-center mb-10">
                <img src="/logo.png" class="w-24 mx-auto mb-4" alt="D&T Logo">
                <h2 class="text-2xl font-bold text-gray-800">Welcome to your D&T Design Hub</h2>
            </div>
            
            <div id="chatbox" class="w-full max-w-2xl flex-1 overflow-y-auto space-y-4"></div>

            <div class="w-full max-w-2xl bg-[#EEF2F6] rounded-full p-4 flex items-center border border-gray-300 shadow-inner">
                <textarea id="prompt" class="flex-1 bg-transparent outline-none px-4 resize-none h-6 text-gray-700" placeholder="Ask D&T Ai-TECH to create, optimize or analyze..."></textarea>
                <div class="flex gap-3 text-gray-500 mr-2">
                    <button class="hover:text-[#8A2BE2]">🎙️</button>
                    <button class="hover:text-[#8A2BE2]">🖼️</button>
                    <button class="bg-[#8A2BE2] text-white p-2 rounded-full hover:scale-105 transition" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function sendMessage() {
            const prompt = document.getElementById('prompt').value;
            if(!prompt) return;
            const chatbox = document.getElementById('chatbox');
            chatbox.innerHTML += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 max-w-[80%]">
                    <p class="text-sm font-bold text-gray-600 mb-1">You</p>
                    <p class="text-gray-800">${prompt}</p>
                    <div class="mt-3 flex gap-2">
                        <button class="text-[10px] bg-gray-100 px-3 py-1 rounded-md" onclick="alert('Copied!')">Copy</button>
                        <button class="text-[10px] bg-gray-100 px-3 py-1 rounded-md">Download PDF</button>
                    </div>
                </div>`;
            document.getElementById('prompt').value = '';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&T Ai-TECH | Operational Architecture Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #07070a;
            --bg-sidebar: #0e0e14;
            --bg-card: #141420;
            --cyan: #00e5ff;
            --purple: #9b6dff;
            --pink: #e040a0;
            --blue: #1a8fff;
            --text: #e8e8f0;
            --text-muted: #7a7a9a;
            --border: rgba(255, 255, 255, 0.06);
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 68px;
            --ease: cubic-bezier(0.25, 1, 0.5, 1);
            --aura: radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.12) 0%, rgba(0, 229, 255, 0.05) 50%, transparent 70%);
        }

        .theme-blue {
            --bg: #050b14;
            --bg-sidebar: #081220;
            --bg-card: #0c1b30;
            --aura: radial-gradient(circle at 50% 50%, rgba(26, 143, 255, 0.12) 0%, rgba(0, 229, 255, 0.05) 50%, transparent 70%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', 'Vazirmatn', sans-serif; transition: background 0.3s; }
        body { display: flex; width: 100vw; height: 100vh; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }

        /* ====== SIDEBAR ====== */
        .sidebar {
            width: var(--sidebar-width); min-width: var(--sidebar-width); background: var(--bg-sidebar);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            transition: width 0.3s var(--ease), min-width 0.3s var(--ease); z-index: 100; flex-shrink: 0; position: relative;
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed-width); min-width: var(--sidebar-collapsed-width); }
        .sidebar-top { height: 64px; display: flex; align-items: center; padding: 0 14px; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow: hidden; }
        
        .toggle-btn {
            width: 40px; height: 40px; border-radius: 50%; background: transparent; border: none; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0;
        }
        .toggle-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); }
        .toggle-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

        .brand { display: flex; align-items: center; gap: 12px; white-space: nowrap; transition: opacity 0.2s; }
        .sidebar.collapsed .brand { opacity: 0; pointer-events: none; }
        .logo-img-fix { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.2)); }
        .brand-name { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
        .brand-name span { background: linear-gradient(90deg, var(--purple), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav { padding: 12px 8px; display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; }
        .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; color: rgba(155, 109, 255, 0.35); padding: 12px 14px 4px; white-space: nowrap; text-align: left; }
        .sidebar.collapsed .nav-label { opacity: 0; }

        .ni {
            display: flex; align-items: center; gap: 14px; padding: 11px 14px; border-radius: 14px; color: var(--text-muted);
            cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; transition: all 0.2s; position: relative;
        }
        .ni:hover { background: rgba(255, 255, 255, 0.03); color: var(--text); }
        .ni.on { background: rgba(155, 109, 255, 0.1); color: var(--cyan); }
        .ni.on::before { content: ''; position: absolute; left: 0; top: 25%; bottom: 25%; width: 3px; background: linear-gradient(180deg, var(--purple), var(--cyan)); border-radius: 0 4px 4px 0; }
        .ni-ico { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .ni-ico svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        
        .sidebar.collapsed .ni { padding: 11px; width: 44px; height: 44px; border-radius: 50%; justify-content: center; margin: 0 auto; }
        .sidebar.collapsed .ni::before { display: none; }
        .sidebar.collapsed .ni-txt { display: none; }
        .sidebar-bottom { padding: 8px; border-top: 1px solid var(--border); }

        /* ====== MAIN CANVAS ====== */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; overflow: hidden; height: 100vh; }
        .main::before { content: ''; position: absolute; inset: 0; background: var(--aura); pointer-events: none; z-index: 0; }
        
        .topbar { height: 64px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(7, 7, 10, 0.5); backdrop-filter: blur(25px); position: relative; z-index: 10; }
        .topbar-t { font-size: 14px; font-weight: 500; color: var(--text-muted); }
        
        .lang-switch { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--cyan); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .lang-switch:hover { background: rgba(0,229,255,0.05); border-color: var(--cyan); }

        .content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; z-index: 1; padding: 24px; }

        /* Greeting */
        .greet { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 24px; width: 100%; max-width: 720px; margin: 0 auto; }
        .greet-logo-box { width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 25px rgba(0, 229, 255, 0.35)); animation: floatG 4s ease-in-out infinite; }
        .main-logo-fix { width: 100%; height: 100%; object-fit: contain; }
        @keyframes floatG { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        
        .greet h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 300; background: linear-gradient(135deg, #ffffff 40%, #71719c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .greet p { font-size: 14px; color: var(--text-muted); max-width: 520px; line-height: 1.75; }

        .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 620px; width: 100%; }
        .chip { padding: 10px 18px; border: 1px solid var(--border); border-radius: 25px; font-size: 12.5px; color: var(--text); cursor: pointer; background: rgba(255, 255, 255, 0.02); transition: all 0.2s var(--ease); backdrop-filter: blur(10px); }
        .chip:hover { border-color: rgba(0, 229, 255, 0.3); background: rgba(0, 229, 255, 0.05); transform: translateY(-1px); }

        /* Chat view log */
        .chat-container { display: none; flex-direction: column; gap: 18px; width: 100%; max-width: 740px; margin: 0 auto; overflow-y: auto; flex: 1; }
        .chat-container.on { display: flex; }
        .mrow { display: flex; width: 100%; }
        .mrow.u { justify-content: flex-end; }
        .mrow.a { justify-content: flex-start; gap: 12px; }
        .bub { max-width: 82%; padding: 14px 20px; border-radius: 20px; font-size: 14px; line-height: 1.7; word-break: break-word; }
        .bub.u { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px 20px 4px 20px; }
        .bub.a { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 4px 20px 20px 20px; backdrop-filter: blur(12px); }
        .bub.ld { color: var(--cyan); font-style: italic; animation: pulseG 1.5s infinite; }
        .bub b { font-weight: 600; font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 6px; }
        
        .b-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-start; }
        .b-btn { padding: 4px 10px; font-size: 11px; font-family: inherit; font-weight: 500; border-radius: 6px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
        .b-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,255,0.04); }

        /* ====== VIEWS ====== */
        .view { display: none; flex-direction: column; width: 100%; max-width: 900px; margin: 0 auto; gap: 20px; }
        .view.on { display: flex; }
        .vh { text-align: center; padding: 10px 0; }
        .vh h2 { font-size: 22px; font-weight: 600; background: linear-gradient(135deg,var(--purple),var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
        .vh p { font-size: 13px; color: var(--text-muted); }

        /* ====== ENGINE INTELLIGENCE VIEW ====== */
        .forge-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; width: 100%; }
        .forge-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .graph-nodes { display: flex; flex-direction: column; gap: 12px; position: relative; }
        .g-node { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.15); font-size: 13px; font-weight: 500; transition: all 0.3s; }
        .g-node.active { border-color: var(--cyan); box-shadow: 0 0 14px rgba(0,229,255,0.15); color: var(--cyan); }
        .g-node.done { border-color: var(--purple); color: var(--purple); }
        .node-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .active .node-dot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
        .done .node-dot { background: var(--purple); }
        
        .console-stream { background: #040406; border-radius: 12px; padding: 14px; font-family: 'Courier New', monospace; font-size: 12px; color: #a2a2c2; line-height: 1.6; height: 260px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.02); }

        .search-center-container { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; max-width: 600px; margin: auto; gap: 20px; }
        .swrap { position: relative; width: 100%; }
        .swrap input { width: 100%; padding: 16px 20px 16px 54px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; color: var(--text); font-size: 14.5px; outline: none; transition: border-color 0.2s; }
        .swrap input:focus { border-color: rgba(0, 229, 255, 0.3); }
        .sico { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--cyan); cursor: pointer; display: flex; align-items: center; }
        .sico svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
        .sres { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; font-size: 14px; color: var(--text); line-height: 1.8; display: none; }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; width: 100%; }
        .project-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; cursor: pointer; transition: all 0.2s var(--ease); backdrop-filter: blur(10px); }
        .project-card:hover { border-color: rgba(0, 229, 255, 0.2); transform: translateY(-2px); }
        .project-tag { display: inline-block; padding: 3px 10px; font-size: 10px; font-weight: 700; border-radius: 8px; margin-top: 12px; background: rgba(124, 58, 237, 0.12); color: var(--purple); border: 1px solid rgba(124, 58, 237, 0.18); }

        .lib-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
        .lib-tab { padding: 8px 18px; font-size: 12.5px; font-weight: 500; border-radius: 30px; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all 0.2s; background: transparent; }
        .lib-tab.on, .lib-tab:hover { border-color: rgba(0, 229, 255, 0.3); color: var(--cyan); background: rgba(0, 229, 255, 0.03); }
        .ccard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 12px; width: 100%; }
        .cch { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .clang { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 6px; background: rgba(0, 229, 255, 0.06); color: var(--cyan); border: 1px solid rgba(0, 229, 255, 0.12); }
        .ccard pre { padding: 18px; font-size: 12px; color: var(--text); font-family: 'Courier New', monospace; overflow-x: auto; background: rgba(0, 0, 0, 0.2); line-height: 1.75; }

        .settings-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 600px; margin: 0 auto; }
        .sett-row { display: flex; align-items: center; justify-content: space-between; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 15px; }
        .sett-info { flex: 1; }
        .sett-info h4 { font-size: 14.5px; font-weight: 600; margin-bottom: 4px; }
        .sett-info p { font-size: 12.5px; color: var(--text-muted); }
        .sett-ctrl select, .sett-ctrl button { padding: 8px 16px; border-radius: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); outline: none; cursor: pointer; font-family: inherit; font-size: 13px; }
        .sett-ctrl button.premium { background: linear-gradient(90deg, var(--purple), var(--pink)); border: none; font-weight: 700; color: #fff; }

        .dropz { width: 100%; max-width: 520px; height: 180px; border: 2px dashed rgba(0, 229, 255, 0.16); border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; background: rgba(0, 229, 255, 0.01); margin: 20px auto; }
        .dropz:hover { border-color: var(--cyan); background: rgba(0, 229, 255, 0.03); }

        /* Command Box Input Control */
        .inp-wrap { padding: 12px 24px 24px; position: relative; z-index: 10; flex-shrink: 0; width: 100%; background: transparent; }
        .findc { font-size: 12px; color: var(--cyan); padding: 4px 0 8px 4px; display: none; align-items: center; gap: 6px; max-width: 760px; margin: 0 auto; }
        .findc.on { display: flex; }
        
        .ibox { max-width: 760px; margin: 0 auto; background: rgba(18, 18, 26, 0.8); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; padding: 8px 18px 8px 8px; display: flex; align-items: flex-end; gap: 10px; box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6); }
        .lacts { display: flex; gap: 4px; align-items: center; padding-bottom: 4px; }
        .ab { width: 38px; height: 38px; border-radius: 50%; background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .ab:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); }
        .ab svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        textarea#prompt { flex: 1; background: transparent; border: none; color: var(--text); font-size: 15px; font-family: inherit; resize: none; outline: none; line-height: 1.65; padding: 8px 0; max-height: 140px; }
        .racts { display: flex; align-items: center; gap: 6px; padding-bottom: 3px; }
        .sbtn { height: 40px; padding: 0 24px; border-radius: 20px; border: none; font-family: inherit; background: linear-gradient(270deg, var(--blue), var(--purple), var(--pink), var(--cyan)); background-size: 300% 300%; animation: gradientS 4s ease infinite; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: transform 0.15s; }
        @keyframes gradientS { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ====== MOBILE BOT NAV ====== */
        .mnav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: rgba(12, 12, 18, 0.9); backdrop-filter: blur(30px); border-top: 1px solid var(--border); z-index: 100; }
        .mnav-in { display: flex; height: 100%; }
        .mni { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; flex: 1; cursor: pointer; color: var(--text-muted); font-size: 10px; font-weight: 500; }
        .mni.on { color: var(--cyan); }
        .mni svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }

        @media(max-width:768px){
            .sidebar { display: none !important; }
            .mnav { display: block; }
            body { padding-bottom: 64px; }
            .topbar { background: var(--bg-sidebar); height: 56px; }
            .greet h1 { font-size: 1.4rem; }
            .greet p { font-size: 13px; }
            .bub { max-width: 90%; font-size: 13.5px; }
            .inp-wrap { padding: 10px; }
            .ibox { border-radius: 24px; padding: 6px 6px 6px 12px; }
            .sbtn { height: 36px; padding: 0 16px; font-size: 12px; border-radius: 18px; }
            .content { padding: 12px; }
            .forge-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <button class="toggle-btn" onclick="toggleSB()" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="brand">
            <img src="/public/assets/logo.svg" class="logo-img-fix" alt="D&T Logo" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=80&auto=format&fit=crop'">
            <div class="brand-text"><span class="brand-name"><span>D&T</span> Ai-TECH</span></div>
        </div>
    </div>
    <nav class="nav">
        <div class="nav-label" id="lbl-workspace">WORKSPACE</div>
        <div class="ni on" data-v="chat" onclick="sw('chat',this)"><div class="ni-ico"><svg viewBox="0 0 24 24"><path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12 L9 9L12 2Z"/></svg></div><span class="ni-txt" id="m-chat">New Chat</span></div>
        <div class="ni" data-v="forge" onclick="sw('forge',this)"><div class="ni-ico"><svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div><span class="ni-txt" id="m-forge">Workflow Forge</span></div>
        <div class="ni" data-v="project" onclick="sw('project',this)"><div class="ni-ico"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><span class="ni-txt" id="m-project">Projects</span></div>
        <div class="ni" data-v="search" onclick="sw('search',this)"><div class="ni-ico"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><span class="ni-txt" id="m-search">Deep Search</span></div>
        
        <div class="nav-label" id="lbl-media">REPOS &AMP; LIBRARIES</div>
        <div class="ni" data-v="images" onclick="sw('images',this)"><div class="ni-ico"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><span class="ni-txt" id="m-images">Image Studio</span></div>
        <div class="ni" data-v="library" onclick="sw('library',this)"><div class="ni-ico"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div><span class="ni-txt" id="m-library">Extended Library</span></div>
    </nav>
    <div class="sidebar-bottom">
        <div class="ni" data-v="settings" onclick="sw('settings',this)">
            <div class="ni-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-

<div class="input-group" style="display: flex; gap: 10px; align-items: center; padding: 10px;">
    <button class="file-btn" onclick="document.getElementById('fileInput').click()" style="background: #1e293b; border: 1px solid #00f2fe; color: #00f2fe; padding: 10px 15px; border-radius: 8px; cursor: pointer;">
        📎 فایل
    </button>
    <input type="file" id="fileInput" style="display:none" onchange="updateFileLabel()">
    
    <textarea id="input" placeholder="دستور خود را وارد کنید..." style="flex:1;"></textarea>
    
    <button class="send-btn" onclick="send()" style="background: #00f2fe; color: #020617; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">SEND</button>
</div>
<div id="fileStatus" style="font-size: 12px; color: #64748b; margin-top: 5px; text-align: right;"></div>

<script>
    // نمایش نام فایل در رابط کاربری
    function updateFileLabel() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('fileStatus');
        status.innerText = fileInput.files.length > 0 ? "فایل آماده ارسال: " + fileInput.files[0].name : "";
    }

    // اصلاح کلید اینتر
    document.getElementById('input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    // تابع send اصلاح شده
    async function send() {
        const input = document.getElementById('input');
        const fileInput = document.getElementById('fileInput');
        const box = document.getElementById('chat-box');
        const prompt = input.value.trim();
        
        if(!prompt && fileInput.files.length === 0) return;

        // نمایش پیام کاربر
        box.innerHTML += `<div class="msg user">${prompt} ${fileInput.files.length > 0 ? '<br><i>(پیوست شد)</i>' : ''}</div>`;
        input.value = '';
        document.getElementById('fileStatus').innerText = '';

        // ارسال فایل
        let fileParts = [];
        for (let file of fileInput.files) {
            const base64 = await new Promise(r => {
                let reader = new FileReader();
                reader.onload = () => r(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            fileParts.push({ inlineData: { data: base64, mimeType: file.type } });
        }

        // فراخوانی API
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt, fileParts })
        });

        const data = await response.json();
        box.innerHTML += `<div class="msg ai">${data.response || data.error}</div>`;
        fileInput.value = '';
        box.scrollTop = box.scrollHeight;
    }
</script>

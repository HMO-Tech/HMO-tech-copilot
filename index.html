<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>D&T Ai-TECH | AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#07070a;
            --bg2:#0f0f15;
            --bg3:#151522;
            --cyan:#00e5ff;
            --blue:#3b82f6;
            --purple:#7c3aed;
            --pink:#c026d3;
            --text:#e8e8f2;
            --text2:#7878a0;
            --border:rgba(255,255,255,0.06);
            --SW:260px;
            --SC:68px;
            --ease:cubic-bezier(0.4,0,0.2,1);
            --glass-glow: 
                radial-gradient(ellipse 60% 50% at 30% 40%, rgba(124, 58, 237, 0.22) 0%, transparent 65%),
                radial-gradient(ellipse 50% 45% at 70% 60%, rgba(59, 130, 246, 0.18) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0, 229, 255, 0.12) 0%, transparent 55%);
        }
        * {
            box-sizing:border-box; margin:0; padding:0;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        html,body{height:100%; overflow:hidden}
        body{background:var(--bg); color:var(--text); font-family:'Space Grotesk','Vazirmatn',sans-serif; display:flex; height:100vh}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.2); border-radius:3px}
        .sb{ width:var(--SW); min-width:var(--SW); background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; transition:width 0.32s var(--ease),min-width 0.32s var(--ease); overflow:hidden; z-index:60; flex-shrink:0; }
        .sb.c{width:var(--SC); min-width:var(--SC)}
        .sb-head{ height:64px; display:flex; align-items:center; padding:0 12px; gap:10px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .hbtn{ width:42px; height:42px; border-radius:12px; border:none; background:transparent; color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s,color .2s; flex-shrink:0; }
        .hbtn:hover{background:rgba(255,255,255,0.06); color:var(--text)}
        .hbtn svg{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round}
        .brand-text{ display:flex; align-items:center; gap:0; white-space:nowrap; overflow:hidden; transition:opacity .25s,transform .25s,max-width .32s; max-width:200px; opacity:1; }
        .sb.c .brand-text{opacity:0; max-width:0; pointer-events:none; transform:translateX(-8px)}
        .brand-name{font-size:15px; font-weight:700; letter-spacing:.2px; white-space:nowrap}
        .brand-name .dt{background:linear-gradient(90deg,var(--purple),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent}
        .sb-nav{padding:10px 8px; display:flex; flex-direction:column; gap:3px; flex:1; overflow-y:auto; overflow-x:hidden}
        .nlbl{ font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:rgba(155,109,255,0.35); padding:12px 14px 4px; white-space:nowrap; transition:opacity .2s,max-height .2s,padding .2s; overflow:hidden; }
        .sb.c .nlbl{opacity:0; max-height:0; padding:0}
        .ni{ display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:12px; color:var(--text2); cursor:pointer; font-size:13.5px; font-weight:500; white-space:nowrap; transition:all .2s; position:relative; text-decoration:none; }
        .ni:hover{background:rgba(255,255,255,0.04); color:var(--text)}
        .ni.on{background:rgba(124,58,237,0.12); color:var(--cyan); border:1px solid rgba(0,229,255,0.05);}
        .ni.on::before{ content:''; position:absolute; left:0; top:25%; bottom:25%; width:3px; background:linear-gradient(180deg,var(--purple),var(--cyan)); border-radius:0 3px 3px 0; }
        .ni-ico{width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center}
        .ni-ico svg{width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
        .ni-txt{transition:opacity .2s,max-width .2s; max-width:200px; overflow:hidden}
        .sb.c .ni-txt{opacity:0; max-width:0}
        .sb.c .ni{padding:12px; width:44px; height:44px; border-radius:50%; justify-content:center; margin:0 auto}
        .sb.c .ni.on::before{display:none}
        .sb-bot{padding:8px 8px 14px; border-top:1px solid var(--border)}
        .main{flex:1; display:flex; flex-direction:column; min-width:0; position:relative; overflow:hidden}
        .main::before{ content:''; position:absolute; inset:0; z-index:0; pointer-events:none; background:var(--glass-glow); }
        .topbar{ height:56px; padding:0 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:rgba(7,7,10,0.6); backdrop-filter:blur(25px); position:relative; z-index:10; flex-shrink:0; }
        .topbar-t{font-size:14px; font-weight:600; color:var(--text2)}
        .tbr{display:flex; gap:6px}
        .ibtn{width:36px; height:36px; border-radius:10px; border:none; background:transparent; color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s}
        .ibtn:hover{background:rgba(255,255,255,0.05); color:var(--text)}
        .ibtn svg{width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
        .content{flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; z-index:1}
        .greet{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; gap:22px}
        .greet-logo{ width:92px; height:92px; filter:drop-shadow(0 0 20px rgba(0,229,255,.35)); animation:gfl 4s ease-in-out infinite; }
        @keyframes gfl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .greet h1{font-size:clamp(1.7rem,3.5vw,2.6rem); font-weight:300; background:linear-gradient(135deg,#f0f0f8 0%,#7878a0 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-.5px; line-height:1.2}
        .greet p{font-size:14px; color:var(--text2); max-width:440px; line-height:1.75}
        .chips{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:580px}
        .chip{padding:8px 16px; border:1px solid rgba(255,255,255,0.08); border-radius:20px; font-size:13px; color:var(--text2); cursor:pointer; background:rgba(255,255,255,0.02); transition:all .2s; white-space:nowrap; backdrop-filter:blur(5px);}
        .chip:hover{border-color:rgba(0,229,255,0.25); color:var(--cyan); background:rgba(0,229,255,0.04)}
        .chat{flex:1; overflow-y:auto; padding:20px; display:none; flex-direction:column; gap:14px}
        .chat.on{display:flex}
        .mrow{display:flex; width:100%}
        .mrow.u{justify-content:flex-end}
        .mrow.a{justify-content:flex-start; align-items:flex-start; gap:10px}
        .av{width:30px; height:30px; flex-shrink:0; border-radius:50%; background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.2); display:flex; align-items:center; justify-content:center; margin-top:2px}
        .bub{max-width:min(78%,660px); padding:12px 18px; border-radius:18px; font-size:14px; line-height:1.75; word-break:break-word; direction:rtl; text-align:right; unicode-bidi:plaintext;}
        .bub.u{background:var(--bg3); border:1px solid var(--border); border-radius:18px 18px 4px 18px}
        .bub.a{background:rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.04); border-radius:4px 18px 18px 18px; backdrop-filter:blur(10px);}
        .bub.ld{color:var(--cyan); font-style:italic}
        .bub b{font-weight:600; font-size:11px; color:var(--text2); display:block; margin-bottom:4px; letter-spacing:.3px}
        .view{flex:1; display:none; flex-direction:column; overflow-y:auto; padding:24px 20px; gap:14px}
        .view.on{display:flex}
        .vh{text-align:center; padding:20px 0 10px}
        .vh h2{font-size:22px; font-weight:600; background:linear-gradient(135deg,var(--purple),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px}
        .vh p{font-size:13px; color:var(--text2)}
        .pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:11px}
        .pcard{background:var(--bg3); border:1px solid var(--border); border-radius:16px; padding:16px; cursor:pointer; transition:all .2s; backdrop-filter:blur(5px);}
        .pcard:hover{border-color:rgba(0,229,255,0.2); background:rgba(0,229,255,0.02); transform:translateY(-2px)}
        .pcard h3{font-size:13px; font-weight:600; margin-bottom:5px}
        .pcard p{font-size:12px; color:var(--text2); line-height:1.55}
        .ptag{display:inline-block; padding:2px 8px; font-size:10px; font-weight:600; border-radius:6px; margin-top:8px; background:rgba(124,58,237,0.1); color:var(--purple); border:1px solid rgba(124,58,237,0.15)}
        .swrap{position:relative; max-width:560px; margin:0 auto 14px}
        .swrap input{width:100%; padding:12px 46px 12px 18px; background:var(--bg3); border:1px solid var(--border); border-radius:14px; color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border .2s; direction:rtl}
        .swrap input:focus{border-color:rgba(0,229,255,0.2)}
        .swrap input::placeholder{color:var(--text2)}
        .sico{position:absolute; right:13px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--cyan); cursor:pointer; display:flex; align-items:center}
        .sico svg{width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:2}
        .sres{background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:16px 20px; font-size:13px; color:var(--text2); line-height:1.8; display:none}
        .vgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(195px,1fr)); gap:11px}
        .vcard{background:var(--bg3); border:1px solid var(--border); border-radius:14px; overflow:hidden; cursor:pointer; transition:all .2s}
        .vcard:hover{border-color:rgba(124,58,237,0.25); transform:translateY(-2px)}
        .vthumb{height:116px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.01);}
        .plic{width:42px; height:42px; border-radius:50%; background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.2); display:flex; align-items:center; justify-content:center}
        .plic svg{width:16px; height:16px; fill:var(--cyan); margin-left:2px}
        .vinfo{padding:9px 12px}
        .vinfo h3{font-size:12px; font-weight:500; margin-bottom:3px}
        .vinfo p{font-size:11px; color:var(--text2)}
        .ltabs{display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-bottom:14px}
        .ltab{padding:5px 14px; font-size:12px; font-weight:500; border-radius:20px; border:1px solid var(--border); color:var(--text2); cursor:pointer; transition:all .2s; background:transparent}
        .ltab.on,.ltab:hover{border-color:rgba(0,229,255,0.2); color:var(--cyan); background:rgba(0,229,255,0.03)}
        .ccard{background:var(--bg3); border:1px solid var(--border); border-radius:13px; overflow:hidden; margin-bottom:4px}
        .cch{padding:9px 15px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between}
        .cch span{font-size:12px; color:var(--text2)}
        .clang{font-size:10px; font-weight:600; padding:2px 8px; border-radius:5px; background:rgba(0,229,255,0.06); color:var(--cyan); border:1px solid rgba(0,229,255,0.12)}
        .ccard pre{padding:14px; font-size:11.5px; color:var(--text); font-family:'Courier New',monospace; overflow-x:auto; background:rgba(0,0,0,0.22); margin:0; line-height:1.7}
        .dropz{width:100%; max-width:500px; height:170px; border:2px dashed rgba(0,229,255,0.18); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:all .2s; background:rgba(0,229,255,0.01); margin:0 auto}
        .dropz:hover{border-color:var(--cyan); background:rgba(0,229,255,0.03)}
        .inp-wrap{padding:10px 16px 18px; position:relative; z-index:10; flex-shrink:0}
        .findc{font-size:12px; color:var(--cyan); padding:3px 0 7px 4px; display:none; align-items:center; gap:5px; max-width:820px; margin:0 auto}
        .findc.on{display:flex}
        .findc svg{width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2}
        .ibox{max-width:820px; margin:0 auto; background:rgba(15,15,22,0.8); backdrop-filter:blur(30px); border:1px solid rgba(255,255,255,0.08); border-radius:28px; padding:8px 8px 8px 16px; display:flex; align-items:flex-end; gap:8px; box-shadow:0 8px 40px rgba(0,0,0,0.55); transition:border-color .2s}
        .ibox:focus-within{border-color:rgba(124,58,237,0.3)}
        .lacts{display:flex; gap:3px; align-items:flex-end; padding-bottom:5px}
        .ab{width:36px; height:36px; border-radius:50%; background:transparent; border:none; color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0}
        .ab:hover{background:rgba(255,255,255,0.05); color:var(--text)}
        .ab svg{width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
        .ab.rec{color:#ff4040; box-shadow:0 0 10px rgba(255,64,64,.25)}
        textarea#pr{flex:1; background:transparent; border:none; color:var(--text); font-size:15px; font-family:inherit; resize:none; outline:none; line-height:1.65; padding:8px 0; max-height:140px; direction:rtl; text-align:right; scrollbar-width:none}
        textarea#pr::-webkit-scrollbar{display:none}
        textarea#pr::placeholder{color:var(--text2)}
        .racts{display:flex; align-items:flex-end; gap:4px; padding-bottom:4px}
        @keyframes sg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .sbtn{height:40px; padding:0 22px; border-radius:20px; border:none; font-family:inherit; background:linear-gradient(270deg,var(--blue),var(--purple),var(--pink),var(--cyan)); background-size:300% 300%; animation:sg 4s ease infinite; color:#fff; font-size:13px; font-weight:700; cursor:pointer; letter-spacing:.5px; transition:transform .15s,box-shadow .15s}
        .sbtn:hover{transform:scale(1.04); box-shadow:0 4px 18px rgba(124,58,237,.35)}
        .sbtn:active{transform:scale(0.97)}
        .mnav{display:none; position:fixed; bottom:0; left:0; right:0; height:58px; background:var(--bg2); border-top:1px solid var(--border); z-index:100}
        .mnav-in{display:flex; height:100%}
        .mni{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; flex:1; padding:4px; cursor:pointer; color:var(--text2); font-size:9.5px; font-weight:500; transition:color .2s}
        .mni.on,.mni:hover{color:var(--cyan)}
        .mni svg{width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
        @media(max-width:768px){ .sb{display:none}.mnav{display:block} body{padding-bottom:58px} .greet h1{font-size:1.5rem} .bub{max-width:88%} .chat{padding:12px 10px} .inp-wrap{padding:8px 10px 12px}}
        @media(max-width:480px){.sbtn{padding:0 14px; font-size:12px}.ibox{padding:6px 6px 6px 12px}}
    </style>
</head>
<body oncontextmenu="return false;">
<aside class="sb" id="sb">
  <div class="sb-head">
    <button class="hbtn" id="hbtn" onclick="toggleSB()" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <svg id="sb-logo" width="36" height="36" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0; filter:drop-shadow(0 0 7px rgba(0,229,255,.38)); cursor:pointer" onclick="toggleSB()">
      <defs>
        <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#9d4edd" />
          <stop offset="50%" stop-color="#3a86ff" />
          <stop offset="100%" stop-color="#00f2fe" />
        </linearGradient>
        <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00f5ff" />
          <stop offset="100%" stop-color="#00e5ff" />
        </linearGradient>
      </defs>
      <path d="M 530,170 L 200,170 A 100,100 0 0,0 100,270 L 100,800 A 100,100 0 0,0 200,900 L 730,900 A 100,100 0 0,0 830,800 L 830,450" fill="none" stroke="url(#frameGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 730,40 Q 730,260 950,260 Q 730,260 730,480 Q 730,260 510,260 Q 730,260 730,40" fill="url(#frameGrad)" />
      <path d="M 260,260 L 470,260" fill="none" stroke="url(#innerGrad)" stroke-width="24" stroke-linecap="round" />
      <circle cx="260" cy="260" r="18" fill="url(#innerGrad)" />
      <circle cx="470" cy="260" r="18" fill="url(#innerGrad)" />
      <path d="M 180,335 L 470,335" fill="none" stroke="url(#innerGrad)" stroke-width="24" stroke-linecap="round" />
      <circle cx="180" cy="335" r="18" fill="url(#innerGrad)" />
      <circle cx="470" cy="335" r="18" fill="url(#innerGrad)" />
      <path d="M 405,395 C 555,395 680,480 680,600 C 680,720 560,790 470,790" fill="none" stroke="url(#innerGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 255,410 L 255,550 L 405,550 L 405,395" fill="none" stroke="url(#innerGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="255" cy="410" r="18" fill="url(#innerGrad)" />
      <path d="M 450,570 L 450,865" fill="none" stroke="url(#innerGrad)" stroke-width="24" stroke-linecap="round" />
      <circle cx="450" cy="570" r="18" fill="url(#innerGrad)" />
      <circle cx="450" cy="865" r="18" fill="url(#innerGrad)" />
      <path d="M 510,640 L 510,720 C 510,750 485,770 470,770" fill="none" stroke="url(#innerGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="510" cy="640" r="18" fill="url(#innerGrad)" />
      <rect x="255" y="660" width="135" height="135" fill="none" stroke="url(#innerGrad)" stroke-width="24" stroke-linejoin="round" />
    </svg>
    <div class="brand-text" id="brand-text">
      <span class="brand-name"><span class="dt">D&T</span> Ai-TECH</span>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="nlbl">WORKSPACE</div>
    <div class="ni on" data-v="chat" onclick="sw('chat',this)">
      <div class="ni-ico"><svg viewBox="0 0 24 24"><path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9L12 2Z"/></svg></div>
      <span class="ni-txt">New Chat</span>
    </div>
    <div class="ni" data-v="project" onclick="sw('project',this)">
      <div class="ni-ico"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      <span class="ni-txt">Projects</span>
    </div>
    <div class="ni" data-v="search" onclick="sw('search',this)">
      <div class="ni-ico"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14" stroke-width="2.2"/></svg></div>
      <span class="ni-txt">Deep Search</span>
    </div>
    <div class="nlbl">MEDIA</div>
    <div class="ni" data-v="images" onclick="sw('images',this)">
      <div class="ni-ico"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
      <span class="ni-txt">Image Studio</span>
    </div>
    <div class="ni" data-v="videos" onclick="sw('videos',this)">
      <div class="ni-ico"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
      <span class="ni-txt">Videos</span>
    </div>
    <div class="nlbl">LIBRARY</div>
    <div class="ni" data-v="library" onclick="sw('library',this)">
      <div class="ni-ico"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
      <span class="ni-txt">Code Library</span>
    </div>
  </nav>

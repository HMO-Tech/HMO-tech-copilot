<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&T Ai-TECH | AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary-d: #2B0066; --primary-neon: #8A2BE2; --cyan: #00e5ff; --bg-main: #f8f9fb; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Space Grotesk', sans-serif; background: var(--bg-main); }
        
        /* سایدبار گرادینت دار */
        .sidebar { width: 260px; background: linear-gradient(180deg, var(--primary-d), var(--primary-neon)); color: white; padding: 24px; display: flex; flex-direction: column; gap: 30px; }
        .logo-box { display: flex; align-items: center; gap: 12px; font-weight: 700; }
        .logo-box img { width: 45px; height: 45px; object-fit: contain; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; opacity: 0.8; transition: 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.2); opacity: 1; }

        /* محیط اصلی استودیو */
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .studio-card { background: white; flex: 1; border-radius: 24px; border: 1px solid #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* باکس چت */
        #chatbox { width: 100%; max-width: 700px; overflow-y: auto; padding: 20px; }
        .input-area { width: 80%; max-width: 700px; padding: 15px 25px; border-radius: 50px; border: 1px solid #ddd; background: #f0f4f9; display: flex; align-items: center; margin-top: 20px; }
        textarea { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; resize: none; }
        .sbtn { background: var(--primary-neon); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        
        /* المان‌های جانبی */
        .b-actions { display: flex; gap: 10px; margin-top: 10px; }
        .b-btn { padding: 5px 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white; font-size: 12px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-box">
        <img src="/logo.png" alt="D&T Logo">
        <span>D&T Ai-TECH</span>
    </div>
    <div class="nav-items">
        <div class="nav-item">Chat</div>
        <div class="nav-item">Projects</div>
        <div class="nav-item">Design Workspace</div>
        <div class="nav-item">Analysis</div>
    </div>
</aside>

<main class="main">
    <div class="studio-card">
        <img src="/logo.png" style="width:100px; margin-bottom: 20px;" alt="Logo">
        <h1>Welcome to your D&T Design Hub</h1>
        <div id="chatbox"></div>
        <div class="input-area">
            <textarea id="prompt" placeholder="Ask D&T Ai-TECH to create, optimize, or analyze..."></textarea>
            <button class="sbtn" onclick="send()">SEND</button>
        </div>
    </div>
</main>

<script>
    function send() {
        const prompt = document.getElementById('prompt').value;
        const chatbox = document.getElementById('chatbox');
        chatbox.innerHTML += `<div class="msg"><b>You:</b> ${prompt}</div>
            <div class="b-actions">
                <button class="b-btn" onclick="copyMsg(this)">Copy</button>
                <button class="b-btn" onclick="exportPDF()">Download PDF</button>
            </div>`;
    }
    function copyMsg(btn) { alert("Copied!"); }
    function exportPDF() { alert("Downloading PDF..."); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&T Ai-TECH | AI Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');

        :root {
            --bg-main: #131314; 
            --bg-sidebar: #1e1f22; 
            --bg-hover: rgba(255, 255, 255, 0.08);
            --brand-cyan: #00ffff;
            --brand-purple: #9068be;
            --text-main: #e3e3e3;
            --text-muted: #c4c7c5;
            --ai-gradient: linear-gradient(270deg, #1c7bba, #9068be, #e6739f, #00ffff);
        }

        body {
            margin: 0; padding: 0; display: flex; height: 100vh;
            font-family: 'Google Sans', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-main); color: var(--text-main);
            overflow: hidden; direction: ltr; 
        }

        /* --- نوار کناری (Sidebar) --- */
        .sidebar {
            width: 280px; background-color: var(--bg-sidebar);
            display: flex; flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; border-right: 1px solid rgba(255,255,255,0.05); z-index: 10;
        }
        .sidebar.collapsed { width: 68px; }
        .sidebar-header { display: flex; align-items: center; padding: 12px 10px; height: 70px; box-sizing: border-box; white-space: nowrap; }
        
        .menu-btn {
            background: transparent; border: none; color: var(--text-muted);
            width: 48px; height: 48px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0;
        }
        .menu-btn:hover { background-color: var(--bg-hover); color: white; }

        .brand-container { display: flex; align-items: center; gap: 8px; margin-left: 5px; transition: opacity 0.2s, transform 0.2s; }
        .sidebar.collapsed .brand-container { opacity: 0; transform: translateX(-10px); pointer-events: none; }

        .brand-title { font-size: 16px; font-weight: 700; color: var(--text-main); letter-spacing: 0.5px; }

        .sidebar-nav { display: flex; flex-direction: column; padding: 10px 12px; gap: 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 16px; border-radius: 25px; 
            color: var(--text-main); text-decoration: none; font-size: 14px; font-weight: 500;
            transition: background 0.2s; white-space: nowrap; overflow: hidden; box-sizing: border-box; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background-color: var(--bg-hover); }
        .nav-icon { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; flex-shrink: 0; }
        .nav-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        
        .sidebar.collapsed .nav-item { padding: 12px; width: 44px; height: 44px; border-radius: 50%; justify-content: center; margin: 0 auto; }
        .sidebar.collapsed .nav-text { display: none; }

        /* --- محتوای اصلی --- */
        .main-content {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            background: radial-gradient(circle at 50% 45%, rgba(144, 104, 190, 0.12) 0%, rgba(0, 255, 255, 0.04) 30%, var(--bg-main) 65%);
            position: relative; padding: 20px 20px 30px 20px; box-sizing: border-box;
        }

        .chat-container { width: 100%; max-width: 820px; flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        #chat-box { width: 100%; display: none; flex-direction: column; gap: 20px; overflow-y: auto; padding: 10px; box-sizing: border-box; max-height: 75vh; }
        
        /* بخش‌های داینامیک سایدبار */
        #dynamic-view { width: 100%; display: none; flex-direction: column; gap: 15px; overflow-y: auto; max-height: 75vh; text-align: center; padding: 40px 20px; }
        .view-title { font-size: 24px; color: var(--brand-cyan); margin-bottom: 10px; }

        .greeting-container { text-align: center; }
        .greeting-text { font-size: 2.5rem; font-weight: 400; color: transparent; background: linear-gradient(90deg, #f8fafc, #94a3b8); -webkit-background-clip: text; margin: 0; letter-spacing: -0.5px; }

        /* تراز هوشمند متون چت (پشتیبانی کامل از فارسی و انگلیسی ترکیبی) */
        .msg-row { display: flex; width: 100%; margin-bottom: 5px; }
        .msg-row.user-row { justify-content: flex-end; }
        .msg-row.ai-row { justify-content: flex-start; }

        .msg-bubble { max-width: 85%; padding: 14px 20px; border-radius: 22px; font-size: 15px; line-height: 1.6; word-wrap: break-word; direction: rtl; text-align: right; unicode-bidi: plaintext; }
        .user-bubble { background-color: #303134; color: var(--text-main); border-radius: 22px 22px 4px 22px; }
        .ai-bubble { color: var(--text-main); background-color: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); }
        .ai-loading { color: var(--brand-cyan); font-style: italic; }

        /* --- باکس ورودی هوش مصنوعی --- */
        .prompt-container { width: 100%; max-width: 820px; display: flex; flex-direction: column; gap: 10px; }
        .prompt-box { background: rgba(30, 31, 34, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 35px; padding: 10px 15px 10px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .prompt-box:focus-within { background: rgba(40, 41, 45, 0.9); border-color: rgba(144, 104, 190, 0.4); }

        .action-icon { color: var(--text-muted); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: all 0.2s; }
        .action-icon:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }

        .chat-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; font-family: inherit; direction: rtl; text-align: right; }
        .chat-input::placeholder { color: #888; direction: rtl; text-align: right; }

        #file-status { font-size: 13px; color: var(--brand-cyan); padding-left: 25px; min-height: 0; font-weight: 500; }

        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .send-btn { background: var(--ai-gradient); background-size: 300% 300%; animation: gradientFlow 4s ease infinite; border: none; color: white; padding: 12px 24px; border-radius: 25px; font-weight: 600; font-size: 14px; cursor: pointer; transition: transform 0.2s; }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(144, 104, 190, 0.5); }
    </style>
</head>
<body>

    <aside class="sidebar" id="app-sidebar">
        <div class="sidebar-header">
            <button class="menu-btn" onclick="toggleSidebar()" title="Collapse menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="brand-container">
                <svg width="34" height="34" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 0 8px rgba(0,255,255,0.4)); flex-shrink:0;">
                    <defs>
                        <linearGradient id="sideGemini" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#9d4edd" />
                            <stop offset="100%" stop-color="#00f2fe" />
                        </linearGradient>
                    </defs>
                    <path d="M 265 50 L 140 50 C 90 50 50 90 50 140 L 50 360 C 50 410 90 450 140 450 L 360 450 C 410 450 450 410 450 360 L 450 215" stroke="url(#sideGemini)" stroke-width="22" stroke-linecap="round" fill="none"/>
                    <path d="M 410 135 C 410 80 435 55 490 55 C 435 55 410 30 410 -25 C 410 30 385 55 330 55 C 385 55 410 80 410 135 Z" transform="translate(-40, 0)" fill="url(#sideGemini)"/>
                    <line x1="125" y1="130" x2="255" y2="130" stroke="url(#sideGemini)" stroke-width="18" stroke-linecap="round"/>
                    <circle cx="125" cy="130" r="10" fill="url(#sideGemini)"/>
                    <circle cx="255" cy="130" r="10" fill="url(#sideGemini)"/>
                    <line x1="85" y1="165" x2="240" y2="165" stroke="url(#sideGemini)" stroke-width="18" stroke-linecap="round"/>
                    <circle cx="85" cy="165" r="10" fill="url(#sideGemini)"/>
                    <circle cx="240" cy="165" r="10" fill="url(#sideGemini)"/>
                    <path d="M 125 200 L 125 260 L 215 260" stroke="url(#sideGemini)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="125" cy="200" r="10" fill="url(#sideGemini)"/>
                    <path d="M 215 200 C 285 200 320 235 320 295 C 320 355 285 390 215 390 C 190 390 175 375 175 355 L 175 295" stroke="url(#sideGemini)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="320" cy="295" r="10" fill="url(#sideGemini)"/>
                    <rect x="120" y="325" width="55" height="55" stroke="url(#sideGemini)" stroke-width="18" stroke-linejoin="round" fill="none"/>
                    <line x1="235" y1="295" x2="235" y2="415" stroke="url(#sideGemini)" stroke-width="18" stroke-linecap="round"/>
                    <circle cx="235" cy="415" r="10" fill="url(#sideGemini)"/>
                </svg>
                <span class="brand-title">D&T Ai-TECH</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-item active" onclick="switchView('chat')">
                <div class="nav-icon" style="color: var(--brand-cyan);">
                    <svg viewBox="0 0 24 24"><path d="M12 2L15 9L22 12L15 15L12 22L9 15L2 12L9 9L12 2Z"></path></svg>
                </div>
                <span class="nav-text">New chat</span>
            </div>
            <div class="nav-item" onclick="switchView('search')">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <span class="nav-text">Search chats</span>
            </div>
            <div class="nav-item" onclick="switchView('videos')">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </div>
                <span class="nav-text">Videos</span>
            </div>
            <div class="nav-item" onclick="switchView('library')">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                </div>
                <span class="nav-text">Library</span>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="chat-container" id="chat-view-wrapper">
            <div class="greeting-container" id="greeting-wrapper">
                <h1 class="greeting-text">Where should we start?</h1>
            </div>
            <div id="chat-box"></div>
        </div>

        <div id="dynamic-view">
            <h2 class="view-title" id="view-header-title">ماژول فرعی</h2>
            <p style="color: var(--text-muted); font-size: 15px;">این بخش در حال توسعه است و به زودی به آرشیو متصل می‌شود.</p>
        </div>

        <div class="prompt-container">
            <div id="file-status"></div>
            <div class="prompt-box">
                <div class="action-icon" title="Upload file" onclick="document.getElementById('hidden-file-input').click()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
                <input type="file" id="hidden-file-input" style="display:none" onchange="updateFileIndicator()">
                
                <input type="text" id="user-prompt" class="chat-input" placeholder="Ask D&T Ai-TECH or upload a design...">
                
                <div class="action-icon" id="mic-btn" title="Voice input" onclick="toggleVoiceInput()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </div>
                
                <button class="send-btn" onclick="handleMessageExecution()">SEND</button>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('app-sidebar').classList.toggle('collapsed');
        }

        // سوئیچ پویای بخش‌های سایدبار
        function switchView(viewName) {
            const chatView = document.getElementById('chat-view-wrapper');
            const dynamicView = document.getElementById('dynamic-view');
            const title = document.getElementById('view-header-title');
            
            // مدیریت کلاس اکتیو دکمه‌ها
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(viewName === 'chat') {
                dynamicView.style.display = 'none';
                chatView.style.display = 'flex';
            } else {
                chatView.style.display = 'none';
                dynamicView.style.display = 'flex';
                if(viewName === 'search') title.innerText = "Search Hub";
                if(viewName === 'videos') title.innerText = "Computational Design Videos";
                if(viewName === 'library') title.innerText = "Project Code Library";
            }
        }

        document.getElementById('user-prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); handleMessageExecution(); }
        });

        function updateFileIndicator() {
            const fileInput = document.getElementById('hidden-file-input');
            const status = document.getElementById('file-status');
            status.innerHTML = fileInput.files.length > 0 ? `<span style="background:rgba(0,255,255,0.06); padding:4px 12px; border-radius:6px; border:1px solid rgba(0,255,255,0.15)">✓ Attached: ${fileInput.files[0].name}</span>` : '';
        }

        // هوش صوتی
        let recognition; let isRecording = false;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition(); recognition.lang = 'fa-IR';
            recognition.onresult = function(e) {
                const text = e.results[0][0].transcript;
                const input = document.getElementById('user-prompt');
                input.value = input.value ? input.value + ' ' + text : text;
            };
            recognition.onend = function() {
                document.getElementById('mic-btn').style.color = 'var(--text-muted)';
                document.getElementById('mic-btn').style.boxShadow = 'none'; isRecording = false;
            };
        }

        function toggleVoiceInput() {
            if (!recognition) return alert("قابلیت صدا در این مرورگر فعال نیست.");
            if (isRecording) { recognition.stop(); } else { 
                isRecording = true; recognition.start();
                document.getElementById('mic-btn').style.color = '#ff4757';
                document.getElementById('mic-btn').style.boxShadow = '0 0 10px rgba(255,71,87,0.3)';
            }
        }

        // ارسال پیام و پردازش چندوجهی
        async function handleMessageExecution() {
            const promptInput = document.getElementById('user-prompt');
            const fileInput = document.getElementById('hidden-file-input');
            const greetingWrapper = document.getElementById('greeting-wrapper');
            const chatBox = document.getElementById('chat-box');
            
            const textValue = promptInput.value.trim();
            if (!textValue && fileInput.files.length === 0) return;

            if (greetingWrapper.style.display !== 'none') {
                greetingWrapper.style.display = 'none'; chatBox.style.display = 'flex';
            }

            let fileLabel = fileInput.files.length > 0 ? `<br><small style="color: var(--brand-cyan);">[File: ${fileInput.files[0].name}]</small>` : '';
            chatBox.innerHTML += `<div class="msg-row user-row"><div class="msg-bubble user-bubble"><b>You</b><br>${textValue || "Analyzing design file..."}${fileLabel}</div></div>`;
            promptInput.value = ''; chatBox.scrollTop = chatBox.scrollHeight;

            const currentAiId = 'ai_' + Date.now();
            chatBox.innerHTML += `<div class="msg-row ai-row"><div class="msg-bubble ai-bubble" id="${currentAiId}"><span class="ai-loading">D&T Core is processing...</span></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            let fileParts = [];
            if (fileInput.files.length > 0) {
                for (let file of fileInput.files) {
                    const base64Data = await new Promise(r => {
                        let rd = new FileReader(); rd.onload = () => r(rd.result.split(',')[1]); rd.readAsDataURL(file);
                    });
                    fileParts.push({ inlineData: { data: base64Data, mimeType: file.type } });
                }
            }
            document.getElementById('file-status').innerText = '';

            try {
                const result = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: textValue, fileParts })
                });
                const data = await result.json();
                if (result.ok && data.response) {
                    document.getElementById(currentAiId).innerHTML = `<b>D&T Ai-TECH</b><br>${data.response}`;
                } else {
                    document.getElementById(currentAiId).innerHTML = `<b>SYSTEM ERROR:</b> Connection failed. Please upload code changes via GitHub and open your official Vercel domain URL.`;
                }
            } catch (error) {
                document.getElementById(currentAiId).innerHTML = `<b>CONNECTION ERROR:</b> درخواست بلاک شد. لطفاً سایت را روی لینک اصلی ورسل تست کنید، نه به صورت فایل محلی آفلاین کامپیوتر.`;
            }
            fileInput.value = ''; chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&T Ai-TECH | Workspace System Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* تمام استایل‌های نئونی شما */
        :root { --bg: #07070a; --bg-sidebar: #0e0e14; --bg-card: #141420; --cyan: #00e5ff; --purple: #9b6dff; --text: #e8e8f0; --border: rgba(255, 255, 255, 0.06); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-top { height: 64px; display: flex; align-items: center; padding: 0 14px; gap: 12px; }
        .logo-img-fix { width: 34px; height: 34px; object-fit: contain; }
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        .content { flex: 1; overflow-y: auto; padding: 24px; display: flex; align-items: center; justify-content: center; }
        .greet { text-align: center; }
        .main-logo-fix { width: 110px; height: 110px; object-fit: contain; }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <div class="brand">
            <!-- آدرس لوگو اصلاح شد -->
            <img src="/logo.png" class="logo-img-fix" alt="D&T Logo">
            <div class="brand-text">D&T Ai-TECH</div>
        </div>
    </div>
    <!-- اینجا سایر بخش‌های منوی سایدبار را قرار بده -->
</aside>

<main class="main" id="main-canvas">
    <div class="content">
        <div class="greet" id="greet">
            <div class="greet-logo-box">
                <!-- آدرس لوگو اصلاح شد -->
                <img src="/logo.png" class="main-logo-fix" alt="D&T Core Logo">
            </div>
            <h1>Where should we start?</h1>
        </div>
        <div class="chat-container" id="chatbox"></div>
    </div>
    <!-- اینجا بخش اینپوت (ibox) را قرار بده -->
</main>

<script>
    /* تمام توابع جاوا اسکریپت اصلی شامل:
       send(), triggerForgePipeline(), toggleSB(), sw() و... را اینجا قرار بده */
    function toggleSB(){ document.getElementById('sidebar').classList.toggle('collapsed'); }
</script>

</body>
</html>
